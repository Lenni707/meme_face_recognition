<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finger-to-Mouth Monkey Meme</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <div id="confettiLayer" class="confetti-layer" aria-hidden="true"></div>
      <section class="camera-panel" aria-label="Webcam feed">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div class="score">Confidence <span id="confidence">0.00</span></div>
        <div id="cameraStatus" class="status">Requesting camera...</div>
      </section>

      <section class="meme-panel" aria-label="Monkey meme display">
        <div id="reactionLabel" class="reaction-label">none</div>
        <img id="monkeyImage" class="reaction-image" src="./assets/thinking_monkey.jpeg" alt="Monkey thinking meme">
        <img id="speedFaceImage" class="reaction-image" src="./assets/speed_face.png" alt="Speed face meme">
        <img id="moggingImage" class="reaction-image" src="./assets/mogger.jpeg" alt="Mogging meme">
        <div id="placeholder" class="placeholder">
          <strong>Reaction image placeholder</strong>
          <span>Add assets/mogger.jpeg for the chin gesture</span>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
